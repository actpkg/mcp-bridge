[package]
name = "mcp-bridge"
version = "0.1.0"
edition = "2024"

[dependencies]
wit-bindgen = { version = "0.53", features = ["async-spawn"] }
wasip3 = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
schemars = "1"
ciborium = "0.2"
base64 = "0.22"
act-types = { path = "../../act-types" }
http = "1"

[lib]
crate-type = ["cdylib"]
