[package]
name = "mcp-bridge"
version = "0.1.0"
edition = "2024"

[dependencies]
wit-bindgen = { version = "0.54", features = ["async-spawn"] }
wasip3 = "0.4"
wasi-fetch = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
schemars = "1"
ciborium = "0.2"
base64 = "0.22"
act-types = "0.2.8"

[build-dependencies]
ciborium = "0.2"
act-types = "0.2.8"
serde_json = "1"

[lib]
crate-type = ["cdylib"]
